name: Update Command Tree

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Continuwuity version tag (e.g. v0.5.6)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z (got '$VERSION')" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../continuwuity -> target

      - name: Clone continuwuity fork
        run: |
          git clone https://github.com/PNRxA/continuwuity.git ../continuwuity
          cd ../continuwuity
          git remote add upstream https://forgejo.ellis.link/continuwuation/continuwuity.git

      - name: Configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update command tree
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-command-tree.sh -p "$VERSION"

      - name: Cleanup
        if: always()
        run: rm -rf ../continuwuity
