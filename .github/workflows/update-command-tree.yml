name: Update Command Tree

on:
  schedule:
    - cron: '0 8 * * *' # daily at 8 AM UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Continuwuity version tag (e.g. v0.5.6) — leave empty to auto-detect latest'
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-command-tree
  cancel-in-progress: true

jobs:
  update:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          for cmd in curl jq gh; do
            command -v "$cmd" &>/dev/null || { echo "Error: $cmd is required" >&2; exit 1; }
          done

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            echo "Fetching latest release from Forgejo..."
            VERSION=$(curl -sf --max-time 10 https://forgejo.ellis.link/api/v1/repos/continuwuation/continuwuity/releases/latest | jq -r '.tag_name')
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "Error: could not fetch latest release" >&2
              exit 1
            fi
            echo "Latest release: $VERSION"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z (got '$VERSION')" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if already processed
        id: check
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip unless VERSION is strictly newer than current
          CURRENT="v$(jq -r '.version' web/package.json)"
          NEWEST=$(printf '%s\n' "$CURRENT" "$VERSION" | sort -V | tail -1)
          if [ "$VERSION" = "$CURRENT" ] || [ "$NEWEST" = "$CURRENT" ]; then
            echo "$VERSION is not newer than $CURRENT — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if a PR for this version already exists (open or merged)
          PR_BRANCH="update/continuwuity-${VERSION}"
          EXISTING=$(gh pr list --head "$PR_BRANCH" --state all --json state --jq '.[0].state' 2>/dev/null || true)
          if [ "$EXISTING" = "MERGED" ] || [ "$EXISTING" = "OPEN" ]; then
            echo "PR for $VERSION already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.skip != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.check.outputs.skip != 'true'
        with:
          workspaces: ../continuwuity -> target

      - name: Clone continuwuity fork
        if: steps.check.outputs.skip != 'true'
        run: |
          git clone https://github.com/PNRxA/continuwuity.git ../continuwuity
          cd ../continuwuity
          git remote add upstream https://forgejo.ellis.link/continuwuation/continuwuity.git

      - name: Configure git user
        if: steps.check.outputs.skip != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update command tree
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-command-tree.sh -p "$VERSION"

      - name: Cleanup
        if: always()
        run: rm -rf ../continuwuity
