name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm test

  backend:
    runs-on: ${{ github.event_name == 'push' && 'self-hosted' || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: api/
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        if: github.event_name == 'push'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api/

      - run: cargo test
        env:
          AWS_LC_SYS_CMAKE_BUILDER: 1
          TEST_HOMESERVER: ${{ secrets.TEST_HOMESERVER }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_ROOM_ID: ${{ secrets.TEST_ROOM_ID }}

  e2e:
    if: github.event_name == 'push'
    runs-on: self-hosted
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api/

      - name: Build backend
        run: cargo build --release
        working-directory: api/
        env:
          AWS_LC_SYS_CMAKE_BUILDER: 1

      - name: Start backend
        run: ./api/target/release/uwu-admin-api &

      - name: Wait for backend to be ready
        run: timeout 30 bash -c 'until curl -sf http://127.0.0.1:3001/api/health 2>/dev/null; do sleep 1; done'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web/

      - run: npx playwright install --with-deps chromium
        working-directory: web/

      - run: npx playwright test
        working-directory: web/
        env:
          TEST_HOMESERVER: ${{ secrets.TEST_HOMESERVER }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_ROOM_ID: ${{ secrets.TEST_ROOM_ID }}

      - name: Stop backend
        if: always()
        run: kill $(lsof -ti:3001) 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
