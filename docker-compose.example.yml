services:
  uwu-admin:
    build:
      context: .
      dockerfile: containers/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Generate with: openssl rand -hex 32
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
    volumes:
      - uwu-data:/data
    restart: unless-stopped

volumes:
  uwu-data:
